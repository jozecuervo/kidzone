<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Would You Like To Make A Game?</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./game.js"></script>
  </head>
  <body>
    <main>
      <a class="back-link" href="../../">Back to Kidzone</a>
      <section class="game-lab">
        <div class="copy">
          <h1>Would you like to make a game?</h1>
          <p>
            Move the comet with the arrow keys or W A S D, catch sparks, then
            change the rules and open a pull request.
          </p>
          <ul>
            <li>Add a new kind of spark.</li>
            <li>Make a win rule.</li>
            <li>Invent a win screen.</li>
          </ul>
        </div>
        <div class="board">
          <div class="hud">
            <p data-score aria-live="polite">0 sparks</p>
            <button type="button" data-reset>Reset</button>
          </div>
          <canvas
            id="game"
            width="720"
            height="420"
            aria-label="A starter game canvas with a moving comet."
          ></canvas>
        </div>
      </section>
    </main>
  </body>
</html>
