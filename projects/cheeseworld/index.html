<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheeseworld</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a2a3a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            width: min(100%, 800px);
            text-align: center;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            border: 6px solid #a0a0a0;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(150, 180, 200, 0.4);
            touch-action: none;
        }
        #ui {
            color: #ffd700;
            padding: 10px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto;
        }
        #instructions {
            color: #cca030;
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.4;
        }
        .touch-controls {
            display: none;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-top: 12px;
            touch-action: none;
        }
        .touch-control {
            min-height: 56px;
            border: 4px solid #a0a0a0;
            border-radius: 8px;
            color: #1a2a3a;
            background: #ffd700;
            box-shadow: 0 5px 0 #8f7524;
            font: inherit;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            user-select: none;
        }
        .touch-control.is-pressed,
        .touch-control:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #8f7524;
        }
        h1 {
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        @media (hover: none), (pointer: coarse), (max-width: 720px) {
            .touch-controls {
                display: grid;
            }
        }
        @media (max-width: 560px) {
            body {
                align-items: flex-start;
                padding: 10px;
            }
            h1 {
                font-size: 28px;
            }
            #ui {
                font-size: 16px;
            }
            .touch-control {
                min-height: 52px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>🧀 Cheeseworld 🐭</h1>
        <div id="ui">
            <span>Cheese: <span id="score">0</span></span>
            <span id="powerUpDisplay" style="color: #ffff00; display: none;">SPEED BOOST!</span>
            <span>Level: <span id="level">1</span></span>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="touch-controls" aria-label="Touch controls">
            <button class="touch-control" type="button" data-control="left" aria-label="Move left">Left</button>
            <button class="touch-control" type="button" data-control="jump" aria-label="Jump">Jump</button>
            <button class="touch-control" type="button" data-control="right" aria-label="Move right">Right</button>
        </div>
        <div id="instructions">
            Keyboard: Arrow keys or WASD to move, Space or Up to jump. Touch: hold Left or Right and tap Jump.
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
