<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Poo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="level-info">
                <div id="level-name">Level 1: Getting Started</div>
                <div id="goo-counter">Available Goo: <span id="goo-count">50</span></div>
                <div id="goal-counter">Need: <span id="goal-count">5</span> goo balls in pipe</div>
            </div>
            <div>
                <button id="pickup-btn">✋ Pick Up Mode</button>
                <button id="explode-btn">💣 Explode Mode</button>
                <button id="poop-btn">💩 Poop Rain</button>
                <button id="reset-btn">Reset Level</button>
            </div>
        </div>
        <div id="level-selector">
            <button class="level-btn" data-level="0">Level 1</button>
            <button class="level-btn" data-level="1">Level 2</button>
            <button class="level-btn" data-level="2">Level 3</button>
            <button class="level-btn" data-level="3">Level 4</button>
            <button class="level-btn" data-level="4">Level 5</button>
        </div>
        <svg id="game-svg" width="1200" height="800">
            <defs>
                <radialGradient id="goo-gradient">
                    <stop offset="0%" style="stop-color:#000;stop-opacity:1" />
                    <stop offset="70%" style="stop-color:#222;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
                </radialGradient>
                <filter id="goo-filter">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
                </filter>
            </defs>
            <g id="connections-layer"></g>
            <g id="static-layer"></g>
            <g id="goo-layer"></g>
        </svg>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
