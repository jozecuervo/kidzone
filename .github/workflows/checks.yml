name: Checks

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  kidzone:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke
      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
